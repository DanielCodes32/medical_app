name: medical_app
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.10.4

dependencies:
  cached_network_image: ^3.4.1
  carousel_slider: ^5.1.2
  chili_debug_view: ^1.3.1
  date_picker_timeline: ^1.2.7
  dio: ^5.9.2
  flutter:
    sdk: flutter
  flutter_bloc: ^9.1.1
  flutter_rating_bar: ^4.0.1
  flutter_slidable: ^4.0.3
  flutter_svg: ^2.2.3
  gap: ^3.0.1
  go_router: ^17.1.0
  hive_ce: ^2.19.3
  hive_ce_flutter: ^2.3.4
  image_picker: ^1.2.2
  intl: ^0.20.2
  lottie: ^3.3.2
  percent_indicator: ^4.2.5
  pinput: ^6.0.2
  postgres: ^2.6.2
  readmore: ^3.0.0
  shared_preferences: ^2.5.4
  shimmer: ^3.0.0
  smooth_page_indicator: ^2.0.1

dev_dependencies:
  build_runner: ^2.11.1
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter
  hive_ce_generator: ^1.11.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/lottie/
  fonts:
    - family: RUBIK
      fonts:
        - asset: assets/fonts/Rubik-Bold.ttf
          weight: 700
        - asset: assets/fonts/Rubik-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Rubik-Regular.ttf
          weight: 400
        - asset: assets/fonts/Rubik-Medium.ttf
          weight: 500
